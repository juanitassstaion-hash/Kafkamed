# KafkaMed — Orquestación Docker Compose
# Modo KRaft: Kafka sin Zookeeper (apache/kafka oficial)
#
# Servicios:
#   kafka     → broker Kafka en modo KRaft (puerto 9092)
#   mongo     → base de datos MongoDB 6.0 (puerto 27017)
#   producer  → publica registros cardíacos en el topic heart-records
#   spark     → consumidor Structured Streaming + inferencia ML
#   api       → API REST Flask (puerto 5000)
#
# Uso:
#   docker compose up --build          # primera vez
#   docker compose up                  # siguientes arranques
#   docker compose down -v             # limpiar todo (incluye volúmenes)

services:

  # ── 1. Kafka (KRaft — sin Zookeeper) ────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafkamed_kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # Identificación del nodo
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller          # nodo único con ambos roles

      # Listeners
      # INTERNAL → comunicación entre contenedores Docker
      # EXTERNAL → acceso desde el host (localhost:9092)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Configuración del topic por defecto
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_NUM_PARTITIONS: 3

      # Identificador de cluster KRaft (UUID fijo para persistencia)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── 2. MongoDB ────────────────────────────────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: kafkamed_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 3. Productor Kafka ───────────────────────────────────────────────────
  producer:
    build:
      context: ../producer
      dockerfile: Dockerfile
    container_name: kafkamed_producer
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092          # listener interno
      KAFKA_TOPIC: heart-records
      CSV_PATH: /app/data/heart.csv
      INTERVAL: "1.0"                       # 1 segundo entre registros
    volumes:
      - ../data:/app/data:ro                 # dataset montado en solo lectura
    command: ["python", "producer.py", "--loop"]

  # ── 4. Consumidor Spark Structured Streaming ─────────────────────────────
  spark:
    build:
      context: ../spark
      dockerfile: Dockerfile
    container_name: kafkamed_spark
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: heart-records
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: kafkamed
      MONGO_COLLECTION: predictions
      MODEL_PATH: /app/data/model_rf
      CHECKPOINT_DIR: /app/data/checkpoint
    volumes:
      - ../data:/app/data
      - ../docs:/app/docs

    command: >
      /opt/spark/bin/spark-submit --master local[2] --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.mongodb.spark:mongo-spark-connector_2.12:10.3.0 consumer_spark.py

  # ── 5. API Flask ──────────────────────────────────────────────────────────
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: kafkamed_api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: kafkamed
      MONGO_COLLECTION: predictions
    ports:
      - "5000:5000"
    volumes:
      - ../data:/app/data:ro

# ── Volúmenes persistentes ─────────────────────────────────────────────────
volumes:
  kafka_data:
  mongo_data: